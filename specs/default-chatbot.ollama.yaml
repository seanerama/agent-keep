# The default chatbot — OLLAMA variant (provider: ollama). This takes the
# chassis live on a FULLY-LOCAL model (ADR 0006, issue #15): a real llama3.2
# reply from the host's Ollama server (3090-tuf, RTX 3090), reached THROUGH the
# paired egress proxy — no cloud dependency, no API key, every model call still
# allowlist-enforced and audited exactly like the anthropic path.
#
# WHY A SEPARATE FILE (not an edit to default-chatbot.yaml): the published image
# ghcr.io/seanerama/agent-keep-default-chatbot is baked STATIC-ONLY (CI builds
# from default-chatbot.yaml). To get a real LOCAL model reply the Operator
# BUILDS this variant and deploys it where an Ollama server is reachable. The
# ONLY host this reaches is host.docker.internal:11434 (the host's Ollama over
# the docker gateway); the worker never routes there directly — its HTTP(S)_PROXY
# points at the egress proxy, which alone carries --add-host to resolve the host
# (ADR 0006 topology). The slug is unchanged so it deploys to the same chassis
# (agent-keep@default-chatbot).
apiVersion: keep/v1
kind: AgentSpec
metadata:
  name: Default Chatbot
  slug: default-chatbot
  description: The chassis default chatbot — dev-http in, audited LOCAL model loop out.
  specVersion: 0.1.0
spec:
  persona:
    identity: >-
      You are the Agent Keep default chatbot — the resident agent of the
      chassis. Answer plainly and briefly; you exist to prove the chassis
      end to end: message in, model call, audited reply out.
    source: static # personality is fixed config; nothing rewrites it
  channels:
    - type: dev-http # ADR 0003: first channel is dev-http; platform
      port: 8000 #     channels are post-skeleton stages
  gateway:
    queue: in-process # single container, serial loop — no broker
  sessions:
    mode: single
  approval: {} # present but trivially empty — no tools are granted,
  #              so nothing can require approval (absence, not policy)
  sandbox:
    profile: container
    # Egress allowlist: ONLY the Ollama endpoint. Every model call is the
    # ALLOW record for host.docker.internal:11434 the proxy audits (ADR 0006);
    # everything else stays denied + audited. Nothing leaves the machine.
    egress:
      - host.docker.internal:11434
  models:
    # THE flip: provider ollama. No API key — Ollama takes none. The one
    # allowlisted host above is the only host this reaches, and the worker
    # traverses the egress proxy to get there (belt + suspenders, ADR 0006).
    # The model_router still ships and meters every call per session (token
    # budget below), so audit token accounting is unchanged from the cloud image
    # (input/output COUNTS record; USD pricing is omitted — local compute).
    provider: ollama
    ollama:
      model: llama3.2:latest # the resident chatbot's local model; change as desired
      baseHost: host.docker.internal:11434 # schema default; the host's Ollama
    tiers: [] # no task routing — one provider fits the whole job
    budgets: # token accounting ON: selects the model-router component,
      maxTokensPerSession: 200000 # which meters every call per session
      onExceed: block
  observability:
    logLevel: info
    audit:
      sink: jsonl # append-only; every model call is recorded
      path: /var/lib/agent-keep/audit.jsonl
  persistence:
    tier: sqlite # real file-backed sessions (SQLITE_PATH at run time)
