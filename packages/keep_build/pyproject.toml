[project]
name = "keep-build"
version = "0.1.0"
description = "Agent Keep image builder — bake ONE validated keep/v1 spec into an absence-composed container image"
requires-python = ">=3.12"
dependencies = [
    "keep-spec",
    "agent-runtime",
]

[tool.uv.sources]
keep-spec = { workspace = true }
agent-runtime = { workspace = true }

[project.scripts]
keep-build = "keep_build.cli:entrypoint"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/keep_build"]
