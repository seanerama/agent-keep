[project]
name = "keep-spec"
version = "0.1.0"
description = "Agent Keep spec schema (keep/v1 envelope) — Pydantic models, validation, JSON Schema export"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7,<3",
    "pyyaml>=6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/keep_spec"]
