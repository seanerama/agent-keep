[project]
name = "keep-egress"
version = "0.1.0"
description = "Agent Keep egress observation proxy — runtime sandbox.egress enforcement, fail-closed, every attempt audited (contract egress-observation v1)"
requires-python = ">=3.12"
dependencies = [
    "keep-spec",
    "pydantic>=2.7,<3",
]

[tool.uv.sources]
keep-spec = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/keep_egress"]
