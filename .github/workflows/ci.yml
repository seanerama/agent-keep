name: CI
# Agent Keep — Verity hygiene gate + stage-1 transplant gates + the stage-2
# container gate. secret-scan + structure (scaffold hygiene) plus lint,
# typecheck, the hermetic unit suite, and the real container integration test
# (the progressive gate — framework-spec §3). On push to main, the
# default-chatbot image is built and pushed to ghcr as the moving :edge tag +
# the immutable :${GITHUB_SHA} tag. :latest is NOT moved here — it tracks
# formal releases only; main is unreleased.
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
  pull-requests: read # gitleaks lists PR commits via the API on pull_request
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Required files present
        run: |
          for f in README.md LICENSE pyproject.toml uv.lock .python-version \
                   packages/agent_runtime/pyproject.toml \
                   packages/keep_spec/pyproject.toml \
                   contracts/agent-spec.md contracts/internal-message.md \
                   contracts/audit-record.md contracts/run-lifecycle.md \
                   contracts/egress-observation.md; do
            test -f "$f" || { echo "missing required file: $f"; exit 1; }
          done
          echo "structure ok"
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: ShellCheck deploy + smoke scripts
        # Stage-5 CI-side gate #1: the deploy machinery is shell, so lint it.
        # deploy.sh + the scoped root helper + the Stages 2-4 smoke scripts the
        # verify step runs. shellcheck is preinstalled on ubuntu-latest runners.
        run: shellcheck deploy.sh deploy/agent-keep-deploy scripts/*.sh
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      - name: mypy (workspace)
        run: uv run mypy
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      - name: Unit tests
        run: uv run pytest -m "not container"
  container:
    # THE integration test (stage 2): keep-build build -> docker run (hardened)
    # -> healthz -> message round-trip via the static provider -> audit line
    # with the run-correlation key -> non-root -> absence grep. Real container,
    # no mocks inside it. Hermetic on PRs: static provider, no secrets, no
    # network beyond image base pulls.
    # Stage 3 rides the same job: tests/integration/test_egress_proxy.py
    # builds the egress-proxy image (keep-build build-proxy, in-fixture),
    # composes agent + proxy + stub on an --internal docker network, and
    # proves the DENY path (refusal + denied `egress` audit record), the
    # hermetic ALLOW path (in-network stub, byte counts), and the
    # no-direct-route boundary — all hermetic on the runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      - name: Container integration test
        run: uv run pytest -m container
  publish-image:
    # Push the default-chatbot AND mechanic images to ghcr on main only, after
    # every gate is green (stage 4: the paired mechanic is a second stamped
    # spec from the SAME runtime — ADR 0001 — so it rides the same publish).
    # Publishes :edge (moving, latest-main) + :${GITHUB_SHA} (immutable).
    # Never moves :latest — that is reserved for formal releases, so :latest
    # always points at a tagged, reviewed release. Dark-launch by design: a
    # published image nobody runs is the chassis "off" state (no kill-switch
    # flag exists — the spec not being deployed IS off).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [structure, secret-scan, lint, typecheck, test, container]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      - name: Log in to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build images from the baked specs
        run: |
          uv run keep-build build specs/default-chatbot.yaml
          uv run keep-build build specs/mechanic.yaml
      - name: Build egress-proxy image
        run: uv run keep-build build-proxy
      - name: Build the anthropic worker variant (issue #15)
        # Cloud provider variant of the same slug — explicit tag so it does not
        # clobber the static :latest; published as :anthropic-edge below.
        run: |
          uv run keep-build build specs/default-chatbot.anthropic.yaml \
            --tag ghcr.io/seanerama/agent-keep-default-chatbot:anthropic-build
      - name: Build the ollama worker variant (ADR 0006, issue #15)
        # The ollama spec shares the `default-chatbot` slug, so build it with an
        # explicit tag to avoid clobbering the static :latest built above. It is
        # a second worker VARIANT of the same image repo, distinguished by an
        # `ollama-` tag prefix (deploy with `./deploy.sh default-chatbot ollama-edge`).
        run: |
          uv run keep-build build specs/default-chatbot.ollama.yaml \
            --tag ghcr.io/seanerama/agent-keep-default-chatbot:ollama-build
      - name: Build the openai worker variant (issue #15, second adapter)
        # The openai spec shares the `default-chatbot` slug too, so build it with
        # an explicit tag to avoid clobbering the static :latest or the ollama
        # variant. A third worker VARIANT of the same image repo, distinguished by
        # an `openai-` tag prefix (deploy with `./deploy.sh default-chatbot
        # openai-edge`, with OPENAI_API_KEY injected at run time). The key is NOT
        # needed at image build — only at boot on the live host.
        run: |
          uv run keep-build build specs/default-chatbot.openai.yaml \
            --tag ghcr.io/seanerama/agent-keep-default-chatbot:openai-build
      - name: Tag and push (edge + immutable SHA; latest is release-only)
        run: |
          # `keep-build build`/`build-proxy` produce local :latest tags as
          # their build output. Retag each to the moving :edge and the
          # immutable :${GITHUB_SHA}, and push ONLY those. Do NOT push
          # :latest from main — latest tracks formal releases, not
          # unreleased main.
          for IMG in ghcr.io/seanerama/agent-keep-default-chatbot \
                     ghcr.io/seanerama/agent-keep-mechanic \
                     ghcr.io/seanerama/agent-keep-egress-proxy; do
            docker tag "$IMG:latest" "$IMG:edge"
            docker tag "$IMG:latest" "$IMG:${GITHUB_SHA}"
            docker push "$IMG:edge"
            docker push "$IMG:${GITHUB_SHA}"
          done
          # The anthropic worker variant: moving :anthropic-edge + immutable
          # :anthropic-${GITHUB_SHA} on the SAME repo (never :latest).
          ANTHROPIC_IMG=ghcr.io/seanerama/agent-keep-default-chatbot
          docker tag "$ANTHROPIC_IMG:anthropic-build" "$ANTHROPIC_IMG:anthropic-edge"
          docker tag "$ANTHROPIC_IMG:anthropic-build" "$ANTHROPIC_IMG:anthropic-${GITHUB_SHA}"
          docker push "$ANTHROPIC_IMG:anthropic-edge"
          docker push "$ANTHROPIC_IMG:anthropic-${GITHUB_SHA}"
          # The ollama worker variant: moving :ollama-edge + immutable
          # :ollama-${GITHUB_SHA} on the SAME repo (never :latest).
          OLLAMA_IMG=ghcr.io/seanerama/agent-keep-default-chatbot
          docker tag "$OLLAMA_IMG:ollama-build" "$OLLAMA_IMG:ollama-edge"
          docker tag "$OLLAMA_IMG:ollama-build" "$OLLAMA_IMG:ollama-${GITHUB_SHA}"
          docker push "$OLLAMA_IMG:ollama-edge"
          docker push "$OLLAMA_IMG:ollama-${GITHUB_SHA}"
          # The openai worker variant: moving :openai-edge + immutable
          # :openai-${GITHUB_SHA} on the SAME repo (never :latest).
          OPENAI_IMG=ghcr.io/seanerama/agent-keep-default-chatbot
          docker tag "$OPENAI_IMG:openai-build" "$OPENAI_IMG:openai-edge"
          docker tag "$OPENAI_IMG:openai-build" "$OPENAI_IMG:openai-${GITHUB_SHA}"
          docker push "$OPENAI_IMG:openai-edge"
          docker push "$OPENAI_IMG:openai-${GITHUB_SHA}"
